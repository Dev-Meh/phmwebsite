# Nginx: tovuti mbele (/) + Django nyuma (/members/, /dashboard/, ...)
# Weka: sudo cp nginx-phm-live.conf /etc/nginx/sites-available/phm
#       sudo ln -sf /etc/nginx/sites-available/phm /etc/nginx/sites-enabled/phm
#       sudo rm -f /etc/nginx/sites-enabled/default
#       sudo nginx -t && sudo systemctl reload nginx

upstream church_django {
    server unix:/home/mussa/church_system/church_management/gunicorn.sock fail_timeout=0;
}

server {
    listen 80 default_server;
    listen [::]:80 default_server;
    server_name 168.144.86.21 _;

    root /var/www/phmwebsite;
    index index.html;

    # ---- Tovuti (static) — LAZIMA kabla ya proxy Django ----
    location = / {
        try_files /index.html =404;
    }
    location /about {
        try_files $uri $uri/ /about/index.html;
    }
    location /our-events {
        try_files $uri $uri/ /our-events/index.html;
    }
    location /contact {
        try_files $uri $uri/ /contact/index.html;
    }
    location /assets/ {
        try_files $uri =404;
        expires 30d;
    }
    location /music/ {
        try_files $uri =404;
        expires 30d;
    }

    # ---- Django files ----
    location /static/ {
        alias /home/mussa/church_system/church_management/staticfiles/;
    }
    location /media/ {
        alias /home/mussa/church_system/church_management/media/;
    }

    # ---- Django app (login, dashboard, events API, admin, ...) ----
    location / {
        proxy_pass http://church_django;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
