# Nginx: tovuti (static) + Django (mfumo)
# Login: LOGIN_URL_PATH (mf. phm-kuingia-a8f2/) — inapitia location / → Gunicorn
# Socket sahihi + POST / inaenda Django (login form ya zamani)

upstream church_django {
    server unix:/home/mussa/church_system/church_management/gunicorn.sock fail_timeout=0;
}

server {
    listen 80 default_server;
    listen [::]:80 default_server;
    server_name 168.144.86.21 _;

    root /var/www/phmwebsite;
    index index.html;

    # POST kwenye / (login iliyotuma action="/") — usipe 405
    error_page 418 = @django_proxy;
    location = / {
        if ($request_method = POST) {
            return 418;
        }
        try_files /index.html =404;
    }

    # Tovuti (GET tu)
    location /about {
        try_files $uri $uri/ /about/index.html;
    }
    location /our-events {
        try_files $uri $uri/ /our-events/index.html;
    }
    location /contact {
        try_files $uri $uri/ /contact/index.html;
    }
    location /assets/ {
        try_files $uri =404;
        expires 30d;
    }
    location /music/ {
        try_files $uri =404;
        expires 30d;
    }

    # Django static/media
    location /static/ {
        alias /home/mussa/church_system/church_management/staticfiles/;
    }
    location /media/ {
        alias /home/mussa/church_system/church_management/media/;
    }

    # Django — njia maalum (hakikisha POST inafika Gunicorn)
    location ^~ /members/ {
        proxy_pass http://church_django;
        include /etc/nginx/proxy_params;
    }
    location ^~ /dashboard/ {
        proxy_pass http://church_django;
        include /etc/nginx/proxy_params;
    }
    location ^~ /events/ {
        proxy_pass http://church_django;
        include /etc/nginx/proxy_params;
    }
    location ^~ /donations/ {
        proxy_pass http://church_django;
        include /etc/nginx/proxy_params;
    }
    location ^~ /sermons/ {
        proxy_pass http://church_django;
        include /etc/nginx/proxy_params;
    }
    location ^~ /api/ {
        proxy_pass http://church_django;
        include /etc/nginx/proxy_params;
    }
    location ^~ /player/ {
        proxy_pass http://church_django;
        include /etc/nginx/proxy_params;
    }
    location ^~ /profile/ {
        proxy_pass http://church_django;
        include /etc/nginx/proxy_params;
    }

    location / {
        proxy_pass http://church_django;
        include /etc/nginx/proxy_params;
    }

    location @django_proxy {
        proxy_pass http://church_django;
        include /etc/nginx/proxy_params;
    }
}
